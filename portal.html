<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Alumnos · Pablo Giraldo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0a;
      --bg2:    #111111;
      --bg3:    #1a1a1a;
      --border: #2a2a2a;
      --red:    #cc0000;
      --green:  #25d366;
      --yellow: #f59e0b;
      --white:  #f0f0f0;
      --gray:   #888888;
      --font-t: 'Oswald', sans-serif;
      --font-b: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-b);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--font-b); }
    input, select, textarea { font-family: var(--font-b); }

    /* ===== NAVBAR ===== */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: #000;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
    }

    .nav-inner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-logo {
      font-family: var(--font-t);
      font-size: 22px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      flex: 1;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
      padding: 6px 12px;
      border-radius: 3px;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #fff;
      background: rgba(255,255,255,0.07);
    }

    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

    .nav-user {
      font-size: 13px;
      color: var(--gray);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gray);
      padding: 6px 14px;
      border-radius: 3px;
      font-size: 13px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    #nav-burger {
      display: none;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 22px;
      padding: 4px;
    }

    #nav-mobile {
      display: none;
      flex-direction: column;
      position: fixed;
      top: 60px; left: 0; right: 0;
      background: #000;
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }

    #nav-mobile.open { display: flex; }

    #nav-mobile a, #nav-mobile button {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      color: #ccc;
      font-size: 15px;
      font-family: var(--font-b);
      background: transparent;
      border-left: none; border-right: none; border-top: none;
      text-align: left;
      transition: color 0.2s;
    }

    #nav-mobile a:hover { color: #fff; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-right .nav-user { display: none; }
      #nav-burger { display: block; }
    }

    /* ===== LAYOUT ===== */
    .page-wrap {
      padding-top: 60px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== LOGIN ===== */
    #screen-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 36px;
    }

    /* ===== FORMS ===== */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #f0f0f0;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #cc0000;
    }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: #cc0000; color: #fff; }
    .btn-primary:hover { background: #aa0000; opacity: 1; }
    .btn-secondary { background: var(--bg3); color: var(--white); border: 1px solid var(--border); }
    .btn-green { background: var(--green); color: #000; }
    .btn-yellow { background: var(--yellow); color: #000; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ===== CARDS ===== */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-family: var(--font-t);
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: var(--white);
    }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-family: var(--font-t);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ===== BADGES ===== */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-green  { background: rgba(37,211,102,0.15); color: var(--green); }
    .badge-red    { background: rgba(204,0,0,0.15);    color: var(--red); }
    .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-gray   { background: rgba(136,136,136,0.15); color: var(--gray); }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      background: var(--bg3);
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
      margin: 8px 0;
    }

    .progress-bar {
      height: 100%;
      background: var(--red);
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    /* ===== STAT CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
    }

    .stat-number {
      font-family: var(--font-t);
      font-size: 42px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }

    .modal-title {
      font-family: var(--font-t);
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: transparent;
      border: none;
      color: var(--gray);
      font-size: 20px;
      line-height: 1;
    }

    .modal-close:hover { color: #fff; }

    /* ===== ALERTS ===== */
    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
      border-left: 3px solid;
    }

    .alert-error  { background: rgba(204,0,0,0.1);    border-color: var(--red);    color: #ff6666; }
    .alert-success{ background: rgba(37,211,102,0.1);  border-color: var(--green);  color: #6ee7a4; }
    .alert-warn   { background: rgba(245,158,11,0.1);  border-color: var(--yellow); color: #fcd34d; }

    /* ===== PAGE HEADER ===== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: var(--font-t);
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ===== MISC ===== */
    .section-label-small {
      font-family: var(--font-t);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 6px;
    }

    .countdown-number {
      font-family: var(--font-t);
      font-size: 56px;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .text-gray { color: var(--gray); }
    .text-red  { color: var(--red); }
    .text-green { color: var(--green); }
    .text-yellow { color: var(--yellow); }
    .text-center { text-align: center; }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-8  { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .history-item:last-child { border-bottom: none; }

    .back-btn {
      background: transparent;
      border: none;
      color: #cc0000;
      font-size: 14px;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      padding: 0;
    }

    .back-btn:hover { color: #fff; }

    #top-back-btn {
      display: none;
      background: transparent;
      border: none;
      color: #cc0000;
      font-size: 14px;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 24px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      width: 100%;
      text-align: left;
    }

    #top-back-btn:hover { color: #fff; }

    .warning-box {
      background: rgba(204,0,0,0.08);
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      color: #ff9999;
      margin-bottom: 20px;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-t);
      font-size: 28px;
      font-weight: 700;
      color: var(--red);
      flex-shrink: 0;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav id="navbar" style="display:none;">
  <div class="nav-inner">
    <div class="nav-logo">
      <img src="Logo_Pablo_giraldo.png" alt="PG" style="height:44px;width:auto;filter:invert(1);">
    </div>
    <ul class="nav-links" id="nav-links-list"></ul>
    <div class="nav-right">
      <span class="nav-user" id="nav-user-name"></span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
      <button id="nav-burger" onclick="document.getElementById('nav-mobile').classList.toggle('open')">☰</button>
    </div>
  </div>
</nav>

<div id="nav-mobile">
  <div id="nav-mobile-links"></div>
  <button style="color:var(--red);" onclick="logout()">Cerrar sesión</button>
</div>

<!-- ===== LOGIN ===== -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">
      <img src="Logo_Pablo_giraldo.png" alt="Pablo Giraldo" style="height:80px;width:auto;filter:invert(1);">
    </div>
    <p class="login-subtitle">Portal de Alumnos · Pablo Giraldo MMA</p>

    <div id="alert-login"></div>

    <div class="form-group">
      <label>Usuario / Documento</label>
      <input type="text" id="login-doc" placeholder="Tu documento de identidad" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn btn-primary btn-full mt-16" onclick="login()">Entrar</button>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" style="display:none;">
  <div class="page-wrap">
    <button id="top-back-btn" onclick="goBack()">← Volver</button>
    <div class="container" id="main-content"></div>
  </div>
</div>

<!-- ===== MODAL: AGREGAR/EDITAR ALUMNO ===== -->
<div class="modal-overlay" id="modal-alumno">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-alumno')">✕</button>
    <div class="modal-title" id="modal-alumno-title">Agregar Alumno</div>
    <div id="alert-alumno-form"></div>
    <input type="hidden" id="alumno-edit-id" />

    <div class="form-row">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="f-nombre" placeholder="Nombre y apellido" />
      </div>
      <div class="form-group">
        <label>Correo</label>
        <input type="email" id="f-correo" placeholder="correo@email.com" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Documento de identidad *</label>
        <input type="text" id="f-doc" placeholder="CC / Pasaporte" />
      </div>
      <div class="form-group">
        <label>Celular</label>
        <input type="text" id="f-celular" placeholder="3001234567" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de nacimiento</label>
        <input type="date" id="f-nacimiento" />
      </div>
      <div class="form-group">
        <label>Plan *</label>
        <select id="f-plan" onchange="planChanged()">
          <option value="">Seleccionar...</option>
          <option value="10_clases">10 Clases</option>
          <option value="15_clases">15 Clases</option>
          <option value="individual">Clase Individual</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Horario — Día</label>
        <select id="f-dia">
          <option value="">Sin asignar</option>
          <option>Lunes</option><option>Martes</option><option>Miércoles</option>
          <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Horario — Hora</label>
        <input type="text" id="f-hora" placeholder="6:00 AM" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de vencimiento</label>
        <input type="date" id="f-vencimiento" />
      </div>
      <div class="form-group">
        <label>Clases totales</label>
        <input type="number" id="f-clases-total" min="1" placeholder="Auto según plan" />
      </div>
    </div>
    <div class="form-group">
      <label>Contraseña de acceso del alumno *</label>
      <input type="text" id="f-pass-alumno" placeholder="Contraseña para que el alumno inicie sesión" />
    </div>
    <div class="form-group">
      <label>Notas del entrenador</label>
      <textarea id="f-notas" placeholder="Observaciones, lesiones, objetivos..."></textarea>
    </div>

    <div style="display:flex;gap:12px;margin-top:8px;">
      <button class="btn btn-primary" onclick="saveAlumno()">Guardar</button>
      <button class="btn btn-secondary" onclick="closeModal('modal-alumno')">Cancelar</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: REGISTRAR PAGO ===== -->
<div class="modal-overlay" id="modal-pago">
  <div class="modal-box" style="max-width:400px;">
    <button class="modal-close" onclick="closeModal('modal-pago')">✕</button>
    <div class="modal-title">Registrar Pago</div>
    <input type="hidden" id="pago-alumno-id" />
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="p-fecha" />
    </div>
    <div class="form-group">
      <label>Monto (COP)</label>
      <input type="number" id="p-monto" placeholder="150000" />
    </div>
    <div class="form-group">
      <label>Plan pagado</label>
      <select id="p-plan">
        <option value="10_clases">10 Clases</option>
        <option value="15_clases">15 Clases</option>
        <option value="individual">Individual</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <input type="text" id="p-notas" placeholder="Referencia, método de pago..." />
    </div>
    <button class="btn btn-primary btn-full mt-8" onclick="savePago()">Guardar Pago</button>
  </div>
</div>

<script>
  // ===== SUPABASE INIT =====
  const { createClient } = supabase;
  const sb = createClient(
    'https://wckurwybqwvsbqkfzmrd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indja3Vyd3licXd2c2Jxa2Z6bXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjQ4NTcsImV4cCI6MjA5NzkwMDg1N30.TRgkfbMk8PudolXsLphlNGFSXXBHK0msBpeC1kh2Ftw'
  );

  // ===== STATE =====
  let session = null;
  let currentView = '';
  let viewHistory = [];  // stack de vistas para navegación hacia atrás

  function goBack() {
    viewHistory.pop(); // quitar vista actual
    if (viewHistory.length === 0) {
      window.location.href = 'index.html';
    } else {
      const prev = viewHistory[viewHistory.length - 1];
      viewHistory.pop(); // navigate() lo va a volver a agregar
      navigate(prev);
    }
  }

  function updateBackBtn() {
    const btn = document.getElementById('top-back-btn');
    if (!btn) return;
    btn.style.display = 'block';
  }

  // ===== INIT =====
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('pg_session');
    if (saved) {
      try {
        session = JSON.parse(saved);
        showApp();
        navigate(session.role === 'admin' ? 'admin-alumnos' : 'alumno-dashboard');
      } catch(e) {
        localStorage.removeItem('pg_session');
        showLogin();
      }
    } else {
      showLogin();
    }
    // Set default vencimiento to end of month
    const eom = lastDayOfMonth();
    const v = document.getElementById('f-vencimiento');
    if (v) v.value = eom;
    // Set default pago fecha
    const pf = document.getElementById('p-fecha');
    if (pf) pf.value = today();
  });

  // ===== HELPERS =====
  function today() {
    return new Date().toISOString().split('T')[0];
  }

  function lastDayOfMonth() {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
  }

  function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str + 'T12:00:00');
    return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const target = new Date(dateStr + 'T23:59:59');
    const now = new Date();
    return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
  }

  function planLabel(plan) {
    const map = { '10_clases': '10 Clases', '15_clases': '15 Clases', 'individual': 'Individual' };
    return map[plan] || plan;
  }

  function planClases(plan) {
    const map = { '10_clases': 10, '15_clases': 15, 'individual': 1 };
    return map[plan] || 0;
  }

  function iniciales(nombre) {
    if (!nombre) return 'PG';
    return nombre.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function showAlert(containerId, type, msg) {
    document.getElementById(containerId).innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  function clearAlert(containerId) {
    document.getElementById(containerId).innerHTML = '';
  }

      `<a href="#" onclick="navigate('${l.view}');document.getElementById('nav-mobile').classList.remove('open');return false;">${l.label}</a>`

  function navigate(view) {

    currentView = view;

    document.querySelectorAll('.nav-links a').forEach(a => {

      'admin-nuevo':        () => renderAdminForm(null),
      'admin-vencimientos': renderAdminVencimientos,
      'alumno-dashboard':   renderAlumnoDashboard,

      'alumno-pagos':       renderAlumnoPagos,
      'alumno-perfil':      renderAlumnoPerfil,
    };

    clearAlert('alert-login');

      return;

    // Admin hardcodeado
    if (doc.toUpperCase() === 'ADMIN' && pass === 'pablo2025') {
      session = { role: 'admin' };
      localStorage.setItem('pg_session', JSON.stringify(session));
      showApp();
      navigate('admin-alumnos');
      return;
    }

    // Alumno: buscar en Supabase
    const { data, error } = await sb
      .from('alumnos')
      .select('*')
      .eq('documento', doc)
      .eq('pass_alumno', pass)
      .maybeSingle();

  async function saveAlumno() {
    const id     = document.getElementById('alumno-edit-id').value;
    const nombre = document.getElementById('f-nombre').value.trim();
    const doc    = document.getElementById('f-doc').value.trim();
    const plan   = document.getElementById('f-plan').value;
    const pass   = document.getElementById('f-pass-alumno').value.trim();
    clearAlert('alert-alumno-form');

    if (!nombre || !doc || !plan || !pass) {
      showAlert('alert-alumno-form', 'error', 'Nombre, documento, plan y contraseña son obligatorios.');
      return;
    }

    const payload = {
      nombre,
      correo:       document.getElementById('f-correo').value.trim(),
      documento:    doc,
      celular:      document.getElementById('f-celular').value.trim(),
      nacimiento:   document.getElementById('f-nacimiento').value || null,

      horario_dia:  document.getElementById('f-dia').value,

        <div class="card-title">Confirmar clase de mañana</div>
        <p class="text-gray mb-16" style="font-size:14px;">
          ${a.horario_dia ? `Tu clase es los ${a.horario_dia} ${a.horario_hora ? 'a las ' + a.horario_hora : ''}.` : 'Consulta con Pablo tu horario asignado.'}
        </p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn btn-green" onclick="confirmarClase('confirmada')">✅ Confirmar asistencia</button>
          <button class="btn btn-yellow" onclick="confirmarClase('aplazada')">⚠️ Aplazar clase</button>
        </div>
        <div id="alert-confirmacion" style="margin-top:12px;"></div>
      </div>`;
  }

  async function confirmarClase(estado) {
    const manana = new Date();
    manana.setDate(manana.getDate() + 1);
    const fechaManana = manana.toISOString().split('T')[0];

    // Check if already confirmed for tomorrow
    const { data: existing } = await sb
      .from('confirmaciones')
      .select('id')
      .eq('alumno_id', session.alumno.id)
      .eq('fecha', fechaManana)
      .maybeSingle();

    if (existing) {
      showAlert('alert-confirmacion', 'warn', 'Ya tienes una confirmación registrada para mañana.');
      return;
    }

    const { error } = await sb.from('confirmaciones').insert({
      alumno_id: session.alumno.id,
      fecha: fechaManana,
      estado,
    });

    if (error) { showAlert('alert-confirmacion', 'error', error.message); return; }

    const msg = estado === 'confirmada'
      ? '✅ Asistencia confirmada para mañana.'
      : '⚠️ Clase aplazada. Coordina con Pablo para reagendarla.';
    showAlert('alert-confirmacion', 'success', msg);
  }

  async function renderAlumnoClases() {
    const content = document.getElementById('main-content');
    content.innerHTML = '<p class="text-gray">Cargando historial...</p>';

    const { data: conf } = await sb
      .from('confirmaciones')
      .select('*')
      .eq('alumno_id', session.alumno.id)
      .order('fecha', { ascending: false });

    const items = (conf || []).map(c => {
      const icon = c.estado === 'confirmada' ? '✅' : c.estado === 'aplazada' ? '⚠️' : '❌';
      const badgeClass = c.estado === 'confirmada' ? 'badge-green' : c.estado === 'aplazada' ? 'badge-yellow' : 'badge-red';
      return `<div class="history-item">
        <span>${icon} <span class="badge ${badgeClass}">${c.estado}</span></span>
        <span class="text-gray">${fmtDate(c.fecha)}</span>
        ${c.nota ? `<span class="text-gray" style="font-size:12px;">— ${c.nota}</span>` : ''}
      </div>`;
    }).join('') || '<p class="text-gray" style="padding:24px 0;">Sin historial de clases aún.</p>';

    content.innerHTML = `
      <div class="page-title mb-16">Historial de Clases</div>
      <div class="warning-box">⚠️ Las cancelaciones con menos de 30 minutos de anticipación cuentan como clase tomada.</div>
      <div class="card">${items}</div>`;
  }

  async function renderAlumnoPagos() {
    const content = document.getElementById('main-content');
    content.innerHTML = '<p class="text-gray">Cargando pagos...</p>';

    const a = await getAlumnoFresh();
    const dias = daysUntil(a.vencimiento);
    const vencido = dias !== null && dias < 0;

    const { data: pagos } = await sb
      .from('pagos')
      .select('*')
      .eq('alumno_id', a.id)
      .order('fecha', { ascending: false });

    const ultimo = pagos && pagos.length > 0 ? pagos[0] : null;

    const histPagos = (pagos || []).map(p =>
      `<div class="history-item">
        <div><strong>$${Number(p.monto).toLocaleString('es-CO')}</strong> · ${planLabel(p.plan)}</div>
        <div class="text-gray" style="font-size:13px;">${fmtDate(p.fecha)}</div>
        ${p.notas ? `<div class="text-gray" style="font-size:12px;">${p.notas}</div>` : ''}
      </div>`
    ).join('') || '<p class="text-gray">Sin pagos registrados.</p>';

    content.innerHTML = `
      <div class="page-title mb-16">Mis Pagos</div>

      <div class="card mb-16">
        <div class="card-title">Estado del plan</div>
        <p><span class="text-gray">Plan actual:</span> <strong>${planLabel(a.plan)}</strong></p>
        <p style="margin-top:8px;"><span class="text-gray">Vencimiento:</span> ${fmtDate(a.vencimiento)}
          ${vencido
            ? `<span class="badge badge-red" style="margin-left:8px;">Vencido</span>`
            : `<span class="badge badge-green" style="margin-left:8px;">Al día · ${dias}d</span>`}</p>
        ${ultimo ? `<p style="margin-top:8px;"><span class="text-gray">Último pago:</span> $${Number(ultimo.monto).toLocaleString('es-CO')} · ${fmtDate(ultimo.fecha)}</p>` : ''}
      </div>

      <div class="card">
        <div class="card-title">Historial de pagos</div>
        ${histPagos}
      </div>`;
  }

  async function renderAlumnoPerfil() {
    const a = await getAlumnoFresh();
    const content = document.getElementById('main-content');
    content.innerHTML = `
      <div class="page-title mb-16">Mi Perfil</div>
      <div class="card">
        <div class="profile-header">
          <div class="profile-avatar">${iniciales(a.nombre)}</div>
          <div>
            <div style="font-family:var(--font-t);font-size:22px;font-weight:700;">${a.nombre}</div>
            <div class="text-gray">${planLabel(a.plan)}</div>
          </div>
        </div>
        <hr class="divider" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <p class="section-label-small mb-8">Documento</p>
            <p>${a.documento || '—'}</p>
          </div>
          <div>
            <p class="section-label-small mb-8">Celular</p>
            <p>${a.celular || '—'}</p>
          </div>
          <div>
            <p class="section-label-small mb-8">Correo</p>
            <p>${a.correo || '—'}</p>
          </div>
          <div>
            <p class="section-label-small mb-8">Fecha de nacimiento</p>
            <p>${fmtDate(a.nacimiento)}</p>
          </div>
          <div>
            <p class="section-label-small mb-8">Horario asignado</p>
            <p>${a.horario_dia || '—'} ${a.horario_hora || ''}</p>
          </div>
          <div>
            <p class="section-label-small mb-8">Vencimiento del plan</p>
            <p>${fmtDate(a.vencimiento)}</p>
          </div>
        </div>
        ${a.notas ? `<hr class="divider"><p class="section-label-small mb-8">Notas del entrenador</p><p class="text-gray">${a.notas}</p>` : ''}
      </div>`;
  }

  // ===== MODAL HELPERS =====
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });
</script>
</body>
</html>
